databases:
  - name: hotftp-db
    plan: free
    databaseName: hotftp_api
    user: hotftp_api_user
    region: oregon

services:
  - name: hotftp-api
    type: web
    runtime: node
    plan: free
    region: oregon
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: hotftp-db
          property: connectionString
      - key: DATABASE_SSL
        value: "false"
      - key: API_DEMO_EMAIL
        value: demo@hotftp.local
      - key: API_DEMO_PASSWORD
        value: demo123
      - key: API_DEMO_DISPLAY_NAME
        value: HOTFTP Demo
