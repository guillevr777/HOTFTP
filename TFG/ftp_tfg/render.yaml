databases:
  - name: hotftp-db
    plan: free
    databaseName: hotftp_api
    user: hotftp_api_user
    region: oregon

services:
  - name: hotftp-api
    type: web
    runtime: node
    plan: free
    region: oregon
    rootDir: backend
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /health
    autoDeployTrigger: off
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: hotftp-db
          property: connectionString
      - key: DATABASE_SSL
        value: "false"

